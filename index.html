<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de LED IoT</title>
</head>
<body>
    <section class="tela-principal" id="tela_principal">
        <h1>Sistema de controle de LED online</h1>
        <div class="container">    
            <h2>Status do LED:</h2>
            <p class="status-ligado">LIGADO</p> 
            <p class="status-desligado">DESLIGADO</p>
        </div>
        <div class="controles">            
            <button id="btn_ligar">Ligar</button>
            <button id="btn_desligar">Desligar</button>
        </div>
    </section>
</body>
</html>
